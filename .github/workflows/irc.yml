name: IRC Build
on:
  workflow_dispatch:
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL ~/.gradle/caches || true
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Persistent keystore from secret
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          echo "$KS_B64" | base64 -d > android/key.jks
          echo "storeFile=$(pwd)/android/key.jks" > android/key.properties
          echo "storePassword=$KS_PASS" >> android/key.properties
          echo "keyPassword=$KS_PASS" >> android/key.properties
          echo "keyAlias=irc" >> android/key.properties
          ls -la android/key.jks
      - name: IRC branding + RU-bypass
        run: |
          sed -i 's#applicationId "app.hiddify.com"#applicationId "online.ironconnect.irc"#' android/app/build.gradle
          sed -i 's#android:label="Hiddify"#android:label="IRC"#' android/app/src/main/AndroidManifest.xml
          sed -i '/"region",/{n;s/Region\.other/Region.ru/;}' lib/features/settings/data/config_option_repository.dart
          # Переводы: appTitle Hiddify → IRC во всех языках
          find assets/translations -name '*.json' -exec sed -i 's/"appTitle": "Hiddify"/"appTitle": "IRC"/g' {} +
          # Цвет темы через dart (дублируем для надёжности)
          sed -i 's/0xFF293CA0/0xFF007AFF/g' lib/core/theme/app_theme.dart
          # Убрать Hiddify из экрана О программе
          find lib/features/about -type f -name '*.dart' -exec sed -i 's/Hiddify/IRC/g' {} + 2>/dev/null || true
          find lib/features/about -type f -name '*.dart' -exec sed -i 's/hiddify\.app/ironconnectonline.com/g' {} + 2>/dev/null || true
          find lib/features/about -type f -name '*.dart' -exec sed -i 's/github\.com\/hiddify\/hiddify-app/ironconnectonline.com/g' {} + 2>/dev/null || true
          grep -A1 '"region",' lib/features/settings/data/config_option_repository.dart | head -3
          flutter pub add dev:flutter_launcher_icons
      - name: Install deps
        run: |
          make android-apk-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
      - name: Prepare
        run: make android-apk-prepare
      - name: Generate IRC icons
        run: dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
      - name: Clean old conflicting icons
        run: |
          cd android/app/src/main/res
          rm -f mipmap-*/ic_launcher.webp mipmap-*/ic_launcher_round.webp values/ic_launcher_background.xml mipmap-anydpi-v26/ic_launcher_round.xml
          cd "$GITHUB_WORKSPACE"
          sed -i 's# android:roundIcon="@mipmap/ic_launcher_round"##' android/app/src/main/AndroidManifest.xml
      - name: Build APK
        run: make android-apk-release
      - name: List output
        run: find dist -type f 2>/dev/null | head
      - uses: actions/upload-artifact@v4
        with:
          name: IRC-Android-APK
          path: dist/**/*.apk
